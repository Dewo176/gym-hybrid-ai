<!DOCTYPE html>
<html>

<head>

    <title>AI Fitness Predictor</title>

    <link rel="stylesheet"
          href="{{ url_for('static',
          filename='css/style.css') }}">

</head>

<body>

<div class="container">

    <h1 class="title">
        🏋️ AI Fitness Predictor
    </h1>

    <p class="subtitle">
        Hybrid Machine Learning:
        K-Means + Random Forest
    </p>

    <form action="/predict" method="POST">

        <div class="form-grid">

            <div class="form-group">
                <label>Age</label>
                <input type="number"
                       name="age"
                       required>
            </div>

            <div class="form-group">
                <label>Gender</label>

                <select name="gender">

                    <option value="Male">
                        Male
                    </option>

                    <option value="Female">
                        Female
                    </option>

                </select>
            </div>

            <div class="form-group">
                <label>Weight (kg)</label>

                <input type="number"
                       step="0.01"
                       name="weight"
                       required>
            </div>

            <div class="form-group">
                <label>Height (m)</label>

                <input type="number"
                       step="0.01"
                       name="height"
                       required>
            </div>

            <div class="form-group">
                <label>Max BPM</label>

                <input type="number"
                       name="max_bpm"
                       required>
            </div>

            <div class="form-group">
                <label>Avg BPM</label>

                <input type="number"
                       name="avg_bpm"
                       required>
            </div>

            <div class="form-group">
                <label>Resting BPM</label>

                <input type="number"
                       name="resting_bpm"
                       required>
            </div>

            <div class="form-group">
                <label>Session Duration</label>

                <input type="number"
                       step="0.01"
                       name="session_duration"
                       required>
            </div>

            <div class="form-group">
                <label>Calories Burned</label>

                <input type="number"
                       name="calories_burned"
                       required>
            </div>

            <div class="form-group">
                <label>Fat Percentage</label>

                <input type="number"
                       step="0.01"
                       name="fat_percentage"
                       required>
            </div>

            <div class="form-group">
                <label>Water Intake</label>

                <input type="number"
                       step="0.01"
                       name="water_intake"
                       required>
            </div>

            <div class="form-group">
                <label>Workout Frequency</label>

                <input type="number"
                       name="workout_frequency"
                       required>
            </div>

            <div class="form-group">
                <label>BMI</label>

                <input type="number"
                       step="0.01"
                       name="bmi"
                       required>
            </div>

            <div class="form-group">
                <label>Workout Type</label>

                <select name="workout_type">

                    <option value="Cardio">
                        Cardio
                    </option>

                    <option value="HIIT">
                        HIIT
                    </option>

                    <option value="Strength">
                        Strength
                    </option>

                    <option value="Yoga">
                        Yoga
                    </option>

                </select>
            </div>

        </div>

        <button type="submit">
            🚀 Predict Fitness Category
        </button>

    </form>

</div>

</body>
</html>
